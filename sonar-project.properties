sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.exclusions=**/*.test.*,**/*.spec.*,dist/**,node_modules/**,coverage/**
sonar.tests=src
sonar.test.inclusions=**/*.test.*,**/*.spec.*

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/main.jsx,src/router/**,src/config/**,src/assets/**,src/**/*.css,src/test/**,**/*.test.*,**/*.spec.*
